name: mobilapp
description: "Sivas Municipality Mobile Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.3
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  intl: ^0.20.2
  provider: ^6.1.4
  flutter_map: ^8.1.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  # Add assets
  assets:
    - assets/images/
    - assets/images/belediye_logo.png
    - assets/images/sivas_placeholder.jpg
  
  # Add Roboto font
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Light.ttf
          weight: 300
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Italic.ttf
          style: italic
